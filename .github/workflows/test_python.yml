name: Python Tests

on:
  push:
    paths:
      - 'Final-DCT/python/**'
  pull_request:
    paths:
      - 'Final-DCT/python/**'

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Lint with flake8
        run: |
          flake8 Final-DCT/python/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 Final-DCT/python/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
